<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact Omar">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a class="site-logo" href="index.html">Omar Shawir</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="academic.html">Academic</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a class="active" href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1>Contact Me</h1>
            <p>Get in touch for collaboration, feedback, or opportunities</p>
        </div>
        <div class="hero-image-placeholder" aria-label="Contact placeholder">Talk</div>
    </header>

    <main>

    <h2>Contact Me</h2>

    <form action="#" method="post">

        <fieldset>
            <legend >Personal Info</legend>

            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname"
                   placeholder="Your full name"
                   required maxlength="60"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"
                   placeholder="your@email.com"
                   required><br><br>

            <label for="phone">Phone:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>

            <label for="age">Age:</label><br>
            <input type="number" id="age" name="age"
                   min="16" max="99"><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob"><br><br>

            <label for="satisfaction">Satisfaction Level:</label><br>
            <input type="range" id="satisfaction" name="satisfaction"
                   min="1" max="10"><br><br>

        </fieldset>

        <br>

        <fieldset >
            <legend>Message Details</legend>

            <label for="subject">Subject:</label><br>
            <select id="subject" name="subject" required>
                <optgroup label="General">
                    <option value="hello">Say Hello</option>
                    <option value="feedback">Feedback</option>
                </optgroup>
                <optgroup label="Work">
                    <option value="job">Job Offer</option>
                    <option value="collab">Collaboration</option>
                </optgroup>
            </select><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" placeholder="Write your message here..."></textarea><br><br>

        </fieldset>

        <br>

        <fieldset >
            <legend>Interests</legend>

            <input type="checkbox" id="web" name="interests" value="web">
            <label for="web">Web Development</label><br>

            <input type="checkbox" id="mobile" name="interests" value="mobile">
            <label for="mobile">Mobile Apps</label><br>

            <input type="checkbox" id="ai" name="interests" value="ai">
            <label for="ai">Artificial Intelligence</label><br>

        </fieldset>

        <br>

        <fieldset >
            <legend>Preferred Contact Method</legend>

            <input type="radio" id="contact-email" name="contact-method" value="email">
            <label for="contact-email">Email</label><br>

            <input type="radio" id="contact-phone" name="contact-method" value="phone">
            <label for="contact-phone">Phone</label><br>

            <input type="radio" id="contact-whatsapp" name="contact-method" value="whatsapp">
            <label for="contact-whatsapp">WhatsApp</label><br>

        </fieldset>

        <br>
        <button type="submit">Send Message</button>

    </form>

    </main>

</body>
</html>
